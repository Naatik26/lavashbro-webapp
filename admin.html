<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LavashBro Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<style>
body {
    font-family: sans-serif;
    background:#f5f5f5;
    padding:10px;
}

.header {
    font-size:22px;
    margin-bottom:10px;
}

.card {
    background:white;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button {
    padding:6px 10px;
    margin:3px;
    border:none;
    border-radius:6px;
    color:white;
}

.accept { background:green; }
.way { background:orange; }
.done { background:blue; }
.cancel { background:red; }

.status {
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">📦 LavashBro Admin Panel</div>

<div id="orders">Yuklanmoqda...</div>

<script>
// 🔑 FIREBASE CONFIG (O‘ZINGNIKINI QO‘Y)
const firebaseConfig = {
    apiKey: "AIzaSyCanG9W8SZRTdsWJQuqTSRFo3SetgWm7t4",
    authDomain: "lavashbro-50af4.firebaseapp.com",
    projectId: "lavashbro-50af4",
    storageBucket: "lavashbro-50af4.firebasestorage.app",
    messagingSenderId: "516749175481",
    appId: "1:516749175481:web:5e85a2db7ca9b558920968"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔄 REAL-TIME BUYURTMALAR
db.ref("orders").on("value", snapshot => {
    let data = snapshot.val();
    let html = "";

    if(!data){
        html = "Hozircha buyurtma yo‘q";
    } else {
        for(let id in data){
            let o = data[id];

            html += `
            <div class="card">
            <b>🆔 ID:</b> ${id} <br><br>

            👤 <b>${o.name}</b><br>
            📞 ${o.phone}<br>
            📍 ${o.address}<br><br>

            🛒 <b>Buyurtma:</b><br>
            ${formatCart(o.cart)}<br>

            <div class="status">Status: ${o.status}</div><br>

            <button class="accept" onclick="update('${id}','✅ Qabul qilindi')">Qabul</button>
            <button class="way" onclick="update('${id}','🚚 Yo‘lda')">Yo‘lda</button>
            <button class="done" onclick="update('${id}','✅ Yetkazildi')">Yetkazildi</button>
            <button class="cancel" onclick="update('${id}','❌ Bekor qilindi')">Bekor</button>
            </div>
            `;
        }
    }

    document.getElementById("orders").innerHTML = html;
});

// 🛒 CART FORMAT
function formatCart(cart){
    let text = "";

    for(let name in cart){
        let item = cart[name];
        text += `${name} × ${item.qty} (${item.price})<br>`;
    }

    return text;
}

// 🔄 STATUS UPDATE
function update(id, status){
    db.ref("orders/" + id).update({
        status: status
    });
}
</script>

</body>
</html>
